# Kiosk-pinned config for the audio-analyzer service.
#
# This file is mounted into the audio-analyzer container by
# voice-enabled-interactions/smart-kiosk-assistant/docker-compose.yml,
# overriding the service's built-in config so the kiosk always boots a
# known-good version regardless of changes in edge-ai-libraries.
app:
  name: Audio Analyzer
  cleanup_on_exit: true
  clear_storage_on_startup: true
  use_ov_genai: True

models:
  asr:
    provider: openai
    name: whisper-tiny
    device: CPU
    weight_format: None
    temperature: 0.0
    diarization: False
    hf_token: None
    models_base_path: "models"

    no_speech_threshold: 0.35
    logprob_threshold: -0.5
    min_duration_sec: 0.5
    min_words: 3
    hallucination_silence_threshold: 2.0
    repetition_penalty: 1.5

    beam_size: 5
    best_of: 5
    word_timestamps: false
    threads: 4

audio_preprocessing:
  chunk_duration_sec: 15
  silence_threshold: -35
  silence_duration: 0.3
  search_window_sec: 1
  chunk_output_path: chunks/
  denoise: false
  denoise_model: ""

audio_util:
  max_size_mb: 200
  allowed_extensions:
    - .wav
    - .mp3
    - .m4a
  chunk_size: 52428800

pipeline:
  delete_chunks_after_use: true

sentiment:
  enabled: false
  model: speechbrain/emotion-recognition-wav2vec2-IEMOCAP
  device: CPU
  provider: openvino
  weight_format: int8
  models_base_path: "models"
  recency_weight: 0.7
  peak_label: angry
