server:
  host: "0.0.0.0"
  port: 8020

api:
  cors_allow_origins:
    - "http://127.0.0.1"
    - "http://localhost"
  openai_model_name: "smart-kiosk-rag"

models:
  llm:
    hf_id: "Qwen/Qwen3-4B-Instruct-2507"
    device: "GPU"               # inference device. Permitted values: CPU | GPU
    weight_format: "int8"       # OpenVINO export precision. Permitted values: int8 | fp16 | fp32
    models_base_path: "./models/llm"
    # temperature omitted — always greedy (do_sample=False)
    cache_dir: "./storage/ov_cache"
  embedding:
    hf_id: "BAAI/bge-large-en-v1.5"
    device: "CPU"               # inference device. Permitted values: CPU | GPU
    backend: "openvino"         # inference backend. Permitted values: openvino
    weight_format: "int8"       # OpenVINO export precision. Permitted values: int8 | fp16 | fp32
    max_seq_length: 512
    batch_size: 16
    models_base_path: "./models/embeddings"
    normalize_embeddings: true  # true | false

storage:
  persist_directory: "./storage/vector_db"
  collection_name: "smart-kiosk-assistant-bge-large"

retrieval:
  top_k: 3
  fetch_k: 5
  # Hard cap on chars for (retrieved context + runtime context + recent
  # conversation history) combined. Question is never truncated.
  max_context_chars: 7000
  score_threshold: null
  # Cross-encoder reranker. When enabled, fetch_k docs are pulled by ANN,
  # rescored jointly with the query, and the top_k by rerank score are kept.
  reranker:
    enabled: true                # true | false
    hf_id: "BAAI/bge-reranker-base"
    device: "GPU"                # inference device. Permitted values: CPU | GPU
    backend: "openvino"          # inference backend. Permitted values: openvino
    weight_format: "int8"        # OpenVINO export precision. Permitted values: int8 | fp16 | fp32
    models_base_path: "./models/rerankers"
    max_length: 384
    batch_size: 8

chunking:
  max_chunk_chars: 1500
  min_chunk_chars: 300
  overlap_chars: 200
  semantic_similarity_threshold: 0.72
  llm_passage_chars: 12000
  llm_passage_tokens: 4000      # wide enough to keep a full semantic intact before LLM splits it
  llm_passage_overlap_tokens: 300
  # Skip the LLM marker call entirely when a coarse passage is already <= this
  # size (it would just fit in one chunk). Prevents orphan-heading splits and
  # cuts ingest time by avoiding per-subsection LLM calls.
  llm_min_passage_chars: 1500
  save_chunks_debug: "./storage/chunks_debug"  # set to null to disable

answering:
  system_prompt: |
    You are Smart Kiosk Assistant.
    Your role depends on the retrieved knowledge-base context. If the context is about QSR, behave like a QSR assistant. If it is about retail, behave like a retail store assistant. Follow the domain, terminology, products, services, and policies shown in the context.

    Answer concisely, clearly, and in a natural spoken style suitable for voice playback.
    Prefer short answers by default: usually 1 to 4 short sentences unless the user asks for more detail.
    Put the direct answer first. Avoid long introductions, repetition, filler, marketing language, and unnecessary background.

    Use the retrieved context as the primary source of truth.
    If runtime context is provided, use it as additional situational context.
    Do not invent store-specific, restaurant-specific, pricing, policy, inventory, location, hours, or promotion details that are not supported by the context.

    If the context is incomplete, answer with what is supported, briefly state uncertainty, and ask a short clarifying question only when it is necessary to help the user.
    If the answer is not available in the context, say so plainly instead of guessing.
  fallback_to_general_knowledge: true
  include_source_markers: false
  # Number of prior user+assistant exchanges to carry as conversational
  # history (so the model can resolve follow-ups like "are you sure?").
  history_turns: 2
  max_tokens: 192
  # If a single model.generate() call does not complete within this many seconds
  # (e.g. GPU deadlock / OOM hang), it is cancelled, the pipeline is reloaded,
  # and the request is retried once with a fresh model instance.
  generation_timeout_secs: 90
  # OVModelForCausalLM has no persistent KV state between calls, so proactive
  # reload is not needed. Set to 0 to disable (gc.collect + malloc_trim run
  # after every generation instead).
  max_generations_before_reload: 0
