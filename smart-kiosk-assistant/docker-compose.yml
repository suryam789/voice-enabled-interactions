# docker-compose.yml
#
# Starts audio-analyzer, text-to-speech, rag-service, kiosk-core, and kiosk-ui.
# Mic audio is captured by the browser via Web Audio API and uploaded as a
# file -- no host mic passthrough into the container is required.
#
# Pull (default):   docker compose pull && docker compose up -d
# Build from src:   docker compose build && docker compose up -d
#                   (requires edge-ai-libraries cloned as a sibling repo;
#                    see docs/build-from-source.md)
# Stop:             docker compose down
# Logs:             docker compose logs -f

services:

  # ---------------------------------------------------------------------------
  # metrics-collector: OS-level hardware utilization collector.
  # Built on intel/retail-benchmark which provides supervisord, qmassa (Intel
  # GPU), Intel NPU tool, Intel PCM (power), sar (CPU), and free (memory).
  #
  # Endpoints (reachable by other containers as http://metrics-collector:9000):
  #   GET /health         -> liveness probe
  #   GET /metrics        -> cpu/gpu/npu/memory/power time-series JSON
  #   GET /platform-info  -> processor, iGPU, NPU, memory, storage summary
  #   GET /memory         -> latest memory snapshot
  # ---------------------------------------------------------------------------
  metrics-collector:
    build:
      context: ./metrics-collector
      dockerfile: Dockerfile
    container_name: metrics-collector
    privileged: true
    pid: host
    ports:
      - "9000:9000"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      METRICS_DIR:       /tmp/results
      METRICS_HTTP_PORT: "9000"
      NPU_LOG:           /tmp/results/npu_usage.csv
    volumes:
      - ./metrics:/tmp/results
      - /sys/devices:/sys/devices
      - /dev/dri:/dev/dri:rw
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/proc
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  audio-analyzer:
    build:
      context: ../edge-ai-libraries/microservices/audio-analyzer
      dockerfile: Dockerfile
    image: ${REGISTRY:-intel}/audio-analyzer:${RELEASE_TAG:-latest}
    container_name: audio-analyzer
    # Hardcoded to match the image's baked-in app user and the
    # ownership of the named volumes. Do not change.
    user: "1000:1000"
    ports:
      - "8010:8010"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "${RENDER_GID:-992}"
    environment:
      # Point HF cache under the same parent as ~/.cache/whisper so a single
      # ./.cache mount persists every model cache the service uses
      # (huggingface, openai-whisper, torch hub, etc.).
      HF_HOME: /app/audio_analyzer/.cache/huggingface
    volumes:
      # Kiosk-pinned config (see ./configs/README.md) — mounted as the
      # service config without modifying edge-ai-libraries.
      - ./configs/audio-analyzer/config.yaml:/app/audio_analyzer/config.yaml:ro
      # Named volumes so the pull flow works without an edge-ai-libraries
      # clone on disk. Inspect with `docker volume inspect <name>`.
      - audio_analyzer_models:/app/audio_analyzer/models
      - audio_analyzer_chunks:/app/audio_analyzer/chunks
      - audio_analyzer_storage:/app/audio_analyzer/storage
      # Single cache mount — covers HF (HF_HOME above) AND openai-whisper's
      # ~/.cache/whisper, so no model is re-downloaded across restarts.
      - audio_analyzer_cache:/app/audio_analyzer/.cache
    # Whisper warmup on GPU can take ~120s; override the image healthcheck
    # so connection-refused during boot doesn't trip `unhealthy` and abort
    # dependent services (kiosk-core / kiosk-ui).
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()"]
      interval: 15s
      timeout: 10s
      start_period: 240s
      retries: 5
    restart: unless-stopped

  text-to-speech:
    build:
      context: ../edge-ai-libraries/microservices/text-to-speech
      dockerfile: Dockerfile
    image: ${REGISTRY:-intel}/text-to-speech:${RELEASE_TAG:-latest}
    container_name: text-to-speech
    user: "1000:1000"
    ports:
      - "8011:8011"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "${RENDER_GID:-992}"
    environment:
      # Point HF cache under ~/.cache so a single ./.cache mount persists
      # every model cache the service uses (HF, torch hub, etc.).
      HF_HOME: /app/text-to-speech/.cache/huggingface
    volumes:
      # Kiosk-pinned config (see ./configs/README.md) — mounted as the
      # service config without modifying edge-ai-libraries.
      - ./configs/text-to-speech/config.yaml:/app/text-to-speech/config.yaml:ro
      # Named volumes so the pull flow works without an edge-ai-libraries
      # clone on disk. Inspect with `docker volume inspect <name>`.
      - text_to_speech_models:/app/text-to-speech/models
      - text_to_speech_storage:/app/text-to-speech/storage
      # Single cache mount — see audio-analyzer block for rationale.
      - text_to_speech_cache:/app/text-to-speech/.cache
    # Model warmup on GPU can take a while; override the image healthcheck so
    # connection-refused during boot doesn't trip `unhealthy` and abort
    # dependent services (kiosk-core / kiosk-ui) via their
    # `depends_on: service_healthy` gates.
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=5).read()"]
      interval: 15s
      timeout: 10s
      start_period: 240s
      retries: 5
    restart: unless-stopped

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-intel}/rag-service:${RELEASE_TAG:-latest}
    container_name: rag-service
    # Hardcoded to match the image's baked-in app user and the
    # ownership of the named volumes. Do not change.
    user: "1000:1000"
    ports:
      - "8020:8020"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "${RENDER_GID:-992}"
    environment:
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - rag_service_models:/app/rag-service/models
      - rag_service_storage:/app/rag-service/storage
      - rag_service_hf_cache:/app/rag-service/.cache/huggingface
    # start_period covers first-run model download + OpenVINO INT8 export
    # (~2-3 min for Qwen3-4B + embeddings + reranker). Cached runs are fast.
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=5).read()"]
      interval: 15s
      timeout: 10s
      start_period: 600s
      retries: 10
    restart: unless-stopped

  kiosk-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REGISTRY:-intel}/kiosk-core:${RELEASE_TAG:-latest}
    container_name: kiosk-core
    user: "1000:1000"
    ports:
      - "8012:8012"
    environment:
      KIOSK_CORE_ANALYZER_URL: http://audio-analyzer:8010/v1/audio/transcriptions
      KIOSK_CORE_RAG_URL:      http://rag-service:8020/api/v1/query
      KIOSK_CORE_TTS_URL:      http://text-to-speech:8011/v1/audio/speech
      KIOSK_CORE_METRICS_URL:  http://metrics-collector:9000
    volumes:
      - generated_audio:/app/generated_audio
    depends_on:
      audio-analyzer:
        condition: service_healthy
      text-to-speech:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8012/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  kiosk-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REGISTRY:-intel}/kiosk-ui:${RELEASE_TAG:-latest}
    container_name: kiosk-ui
    user: "1000:1000"
    ports:
      - "7860:7860"
    environment:
      KIOSK_CORE_UI_BASE_URL:     http://kiosk-core:8012
      KIOSK_CORE_UI_ANALYZER_URL: http://audio-analyzer:8010/v1/audio/transcriptions
      KIOSK_CORE_UI_RAG_URL:      http://rag-service:8020/api/v1/query
      KIOSK_CORE_UI_TTS_URL:      http://text-to-speech:8011/v1/audio/speech
      KIOSK_CORE_UI_METRICS_URL:  http://metrics-collector:9000
    volumes:
      - generated_audio:/app/generated_audio
    command: ["python3", "gradio_app.py"]
    depends_on:
      kiosk-core:
        condition: service_healthy
    restart: unless-stopped

volumes:
  generated_audio:
  audio_analyzer_models:
  audio_analyzer_chunks:
  audio_analyzer_storage:
  audio_analyzer_cache:
  text_to_speech_models:
  text_to_speech_storage:
  text_to_speech_cache:
  rag_service_models:
  rag_service_storage:
  rag_service_hf_cache:
